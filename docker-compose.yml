services:
  ipas-ekonomi:
    build:
      context: .
      dockerfile: Dockerfile
    image: ipas-ekonomi:latest
    container_name: ${CONTAINER_NAME:-ipas-ekonomi}
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      HOSTNAME: 0.0.0.0
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-https://ipasnamsel.my.id}
    volumes:
      - ipas-ekonomi-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: ${CADDY_CONTAINER_NAME:-ipas-ekonomi-caddy}
    depends_on:
      - ipas-ekonomi
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-ipasnamsel.my.id}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  ipas-ekonomi-data:
    name: ${DATA_VOLUME_NAME:-ipas-ekonomi-data}
  caddy_data:
    name: ${CADDY_DATA_VOLUME_NAME:-ipas-ekonomi-caddy-data}
  caddy_config:
    name: ${CADDY_CONFIG_VOLUME_NAME:-ipas-ekonomi-caddy-config}
